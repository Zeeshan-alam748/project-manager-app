spring.application.name=project-manager
server.port=${PORT:8080}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/project_manager?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:ProjectManagerJwtSecretKey2026ForSpringBootSecurityDemo12345}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}
